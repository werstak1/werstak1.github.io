<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Покупка билета</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

       
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1rem;
            text-align: center;
            border-radius: 15px 15px 0 0;
        }

        .form-box {
            background: white;
            padding: 2rem;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            background: #ffd700;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffed4a;
            transform: translateY(-2px);
        }

        .note {
            margin-top: 1rem;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Покупка билета</h1>
        <p>Афиша</p>
    </div>

    <div class="form-box">
        <form action="#" method="post">

            <div class="form-group">
                <label>Имя</label>
                <input type="text" name="name" placeholder="Ваше имя" required>
            </div>

            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" name="phone" placeholder="+7..." required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label>Тип билета</label>
                <select name="ticket">
                    <option>5000₽</option>
                    <option>VIP — 15000₽</option>
                </select>
            </div>

            <div class="form-group">
                <label>Количество билетов</label>
                <input type="number" name="count" min="1" max="10" value="1">
            </div>

            <button class="btn" type="submit">Отправить заявку</button>

        </form>

        <p class="note">Мы свяжемся с вами для подтверждения</p>
    </div>

</div>

</body>
</html>
