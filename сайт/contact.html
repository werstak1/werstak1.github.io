<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
        }

        .nav-link:hover {
            color: #ffd700;
        }

        
        .contacts {
            padding: 5rem 0;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
        }

        .contacts-wrapper {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .contact-card {
            flex: 1 1 300px;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
        }

        .contact-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #667eea;
        }

        .contact-item {
            margin-bottom: 0.5rem;
        }

     
        .map {
            margin-top: 3rem;
            border-radius: 15px;
            overflow: hidden;
        }

     
        .footer {
            text-align: center;
            padding: 2rem;
            background: #222;
            color: white;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="logo">Контакты</div>
        <nav class="nav">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="cobitue.html" class="nav-link">Событие</a>
            <a href="contact.html" class="nav-link">Контакты</a>
        </nav>
    </div>
</header>


<section class="contacts">
    <div class="container">
        <h2 class="section-title">Контакты</h2>

        <div class="contacts-wrapper">

            <div class="contact-card">
                <h3 class="contact-title">📞 Связь</h3>
                <p class="contact-item"><strong>Телефон:</strong> +7 (999) 777-66-66</p>
                <p class="contact-item"><strong>Email:</strong> info@danya.ru</p>
            </div>

            <div class="contact-card">
                <h3 class="contact-title">🌐 Соцсети</h3>
                <p class="contact-item">Instagram: @DanyaAfisha</p>
                <p class="contact-item">Telegram: @DanyaAfisha</p>
                <p class="contact-item">VK: vk.com/DanyaAfisha</p>
            </div>

        </div>


        <div class="map">
            <iframe 
                src="https://maps.google.com/maps?q=Moscow&t=&z=13&ie=UTF8&iwloc=&output=embed"
                width="100%" 
                height="400" 
                style="border:0;">
            </iframe>
        </div>

    </div>
</section>
</body>
</html>
